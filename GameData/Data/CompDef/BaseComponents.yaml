components:
    SectorComponent:
        ID: 0
        Name: "Sector"
        Description: "Allows access to the sector system."
    RNGComponent:
        ID: 1
        Name: "RNG"
        Description: "Generates a random number."
    CameraComponent:
        ID: 4
        Name: "Camera"
        Description: "Camera used for rendering."
        Settings:
            BackColor:
                Name: "Background Color"
                Description: "Sets the GL clear color."
                Type: "Color"
                Internal: backColor
            Offset:
                Name: "Offset"
                Description: "Offsets the camera."
                Type: "Vector2"
                Internal: offset
    InputComponent:
        ID: 7
        Name: "Input"
        Description: "Used for input, every Entity spawns with this component by default."
    AudioComponent:
        ID: 9
        Name: "Audio Player"
        Description: "Plays an audio file. Used for both sound effects and music."
        Settings:
            AudioName: 
                Name: "Audio Name"
                Description: "Audio to be loaded. If left empty, it will not play any audio."
                Type: "String"
                Internal: "audioName"
            Loop:
                Name: "Loop"
                Description: "If true, the audio will play again after its finished."
                Type: "Bool"
                Internal: "loop"
            PlayOnAwake:
                Name: "Play On Awake"
                Description: "If true, the audio will play immediately after its loaded."
                Type: "Bool"
                Internal: "playOnAwake"
    MeshRendererComponent:
        ID: 14
        Name: "Mesh Renderer"
        Description: "Render a mesh with a given shader"
        Settings:
            Mesh:
                Name: "Mesh Name"
                Description: "Name of the mesh."
                Type: "String"
                Internal: "meshName"
            Shader:
                Name: "Shader Name"
                Description: "Name of the shader to be used for rendering."
                Type: "String"
                Internal: "shaderName"
            Instanceable:
                Name: "Is Instanceable"
                Description: "Whether this model is available for instancing."
                Type: "Bool"
                Internal: "instance"



    EditorTester:
        ID: 512
        Name: "Editor Tester"
        Description: "Purely for testing the editor, game will crash if this loads!"
        Settings:
            NumTest:
                Name: "Number"
                Description: ""
                Type: "Number"
                Internal: ntest
            FloatTest:
                Name: "Float"
                Description: ""
                Type: "Float"
                Internal: ftest
            BoolTest:
                Name: "Bool"
                Description: ""
                Type: "Bool"
                Internal: btest
            StrTest:
                Name: "String"
                Description: ""
                Type: "String"
                Internal: stest
            Vector2Test:
                Name: "Vector2"
                Description: ""
                Type: "Vector2"
                Internal: vtest
            ColorTest:
                Name: "Color"
                Description: ""
                Type: "Color"
                Internal: ctest
        

#### Game Components ####
    Freecam:
        ID: 1024
        Name: "Freecam"
        Description: "Movement for a free cam."
    