# This is not an actual shader, but rather a spec that shows all names.

# The following is a regular object shader
shader:
    # This flag defines this shader as a rendering shader.
    isCompute: false

    shaderName: regularPBR

    # Whether the shader should perform depth opertations, true by default, can be left out.
    depthTest: true

    # This dictates how many materials can be derived from this shader. For example, one fancy wall shader
    # could only ever create about one or two materials, while a general purpose PBR shader may have 
    # hundreds of materials. This dicates how many get created.
    # |  value  |   max materials   |    recommended usage    |
    # |    0    |         4         |      niche effect       |
    # |    1    |       128         | building specifc shader |
    # |    2    |       512         |   area specifc shader   |
    # |    3    |      2048         |  general purpose shader |
    # Shader compilation for this shader gets skipped if you dare step out of this range.
    abundance: 2

    # This defines which code to use for the stages. We dont use any file extensions here,
    # Development uses GLSL which gets compiled to Spir-V during packaging. The engine knows, trust.
    # The engine also appends the shader type at the end.
    # So if you provide vertexCode: regularPBR, the engine will look for regularPBRVertex.glsl/spv
    vertexCode: regularPBR
    fragmentCode: regularPBR

    # Optional, but if defined, then the appropirate info must be provided as well.
    tessellationCode: regularPBRTessellation
    geometryCode: regularPBRGeometry

    # Since the fragment shader info isnt defined at shader compilation time, 
    # this is only a sanity test for whatever material will use it.
    fragmentInfo:
        # A material must always hand off this number of textures.
        expectTextureCount: 2 
        # the total number of both must equal expectTextureCount. These are temp names.
        # In the material, all textures defined by colorTextures must end with .png.
        # In the material, all textures defined by pbrTexture must end with .pbr.
        # These are only required if expectTextureCount is higher than zero.
        colorTextures: [base]
        pbrTextures: [pbr]

        # Another sanity check, all these should be present in the development textures
        # in the material definition.
        # These are only required if expectTextureCount is higher than zero.
        expectChannelNames: [color, normal, roughness, metal, ao]

        # This sets expected parameters that a material must provide.
        # The key name must match in the material, the value is the type.
        # accepted: float, int, vec2, vec3, vec4
        expectParams:
            colorTint: vec4
            roughnessScale: float
            metalnessScale: float

    # Optional, gives info about the tessellation being performed.
    # The engine assumes that you take in vertexes.
    tessellationInfo:
        patchControlPoints: 3

    # Optional, gives info about the geometry generation being performed.
    geometryInfo:
        # accepted: points, lines, triangles
        inputPrimitive: triangles 



